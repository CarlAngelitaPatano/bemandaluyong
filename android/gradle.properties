org.gradle.jvmargs=-Xmx1024M -XX:MaxMetaspaceSize=512M -XX:ReservedCodeCacheSize=128m -XX:+UseSerialGC -Dfile.encoding=UTF-8
org.gradle.workers.max=2
org.gradle.parallel=false
# Don't keep a background daemon alive between builds — on low-RAM machines
# it hangs and holds cache locks, blocking the next build. One-shot builds
# are a bit slower but avoid the "Timeout waiting to lock" zombie problem.
org.gradle.daemon=false
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
